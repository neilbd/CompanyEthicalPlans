services:
  mongo:
    image: mongo:7
    container_name: ethicalplans-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # S3-compatible storage for local development (no AWS account needed).
  # The app talks to it by setting S3_ENDPOINT=http://localhost:9000 in .env.
  minio:
    image: minio/minio:latest
    container_name: ethicalplans-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  # One-shot job that creates the bucket on startup, then exits.
  minio-createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/ethicalplans-analyses;
      exit 0;
      "

volumes:
  mongo-data:
  minio-data:
